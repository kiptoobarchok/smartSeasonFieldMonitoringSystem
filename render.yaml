services:
  - type: web
    name: smartseason-backend
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: smartseason-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://smartseason-frontend.onrender.com
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: smartseason-db
          property: connectionString

  - type: web
    name: smartseason-frontend
    env: node
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://smartseason-backend.onrender.com/api

databases:
  - name: smartseason-db
    plan: free
